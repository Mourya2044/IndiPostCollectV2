name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Frontend Dependencies and Build
        env:
          VITE_SERVER_URL: /api
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
        run: |
          cd frontend
          npm ci
          npm run build

      # --- Dynamic Security Group Whitelisting ---
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Get Runner IP
        id: ip
        run: echo "ipv4=$(curl -s https://api.ipify.org)" >> $GITHUB_OUTPUT

      - name: Whitelist Runner IP in Security Group
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id sg-0d189d7d40e41877f \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32

      - name: Copy Frontend Build to EC2
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "frontend/dist/"
          target: "/home/ubuntu/indipostcollectv2/frontend/dist"
          strip_components: 2

      # --- Deploy Backend & Restart Process on EC2 ---
      - name: Execute Remote SSH Commands to Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Navigate to the base directory and pull fresh code
            cd /home/ubuntu/indipostcollectv2
            git pull origin main
            
            # 2. Navigate explicitly using the full path to avoid folder skipping bugs
            cd /home/ubuntu/indipostcollectv2/backend
            
            # 3. Clean production module install
            npm install --omit=dev
            
            # 4. Restart backend utilizing the absolute file path
            pm2 restart indipostcollect-backend || pm2 start /home/ubuntu/indipostcollectv2/backend/src/index.js --name indipostcollect-backend

            # 5. Reload routing infrastructure
            sudo cp /home/ubuntu/indipostcollectv2/nginx.conf /etc/nginx/sites-available/indipostcollect
            sudo ln -sf /etc/nginx/sites-available/indipostcollect /etc/nginx/sites-enabled/
            sudo -n nginx -t && sudo -n systemctl restart nginx

      - name: Revoke Runner IP from Security Group
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id sg-0d189d7d40e41877f \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32