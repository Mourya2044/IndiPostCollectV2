name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Frontend Dependencies and Build
        env:
          VITE_SERVER_URL: /api
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Copy Frontend Build to EC2
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "frontend/dist/*"
          target: "/home/ubuntu/IndiPostCollectV2/frontend/dist"
          strip_components: 2

      # --- Deploy Backend & Restart Process on EC2 ---
      - name: Execute Remote SSH Commands to Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Navigate to the repository directory
            cd ~/IndiPostCollectV2
            
            # Pull latest changes from git
            git pull origin main
            
            # --- Deploy Backend ---
            cd backend
            # Install production dependencies
            npm ci --omit=dev
            # Restart backend using PM2, or start it if it's not running
            pm2 restart indipostcollect-backend || pm2 start src/index.js --name indipostcollect-backend