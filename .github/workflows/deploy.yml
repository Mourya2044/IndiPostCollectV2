name: Build and Deploy to AWS

on:
  push:
    branches:
      - main  # Triggers the pipeline every time you push to the main branch

permissions:
  contents: read
  packages: write  # Grants permission to push images to GitHub Container Registry

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ job.status }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build & Push Backend
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/mourya2044/indipostcollect-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build & Push Frontend
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/mourya2044/indipostcollect-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Execute Remote SSH Commands to Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Navigate to the repository directory
            cd ~/IndiPostCollectV2
            
            # Sync the compose configuration file
            git pull origin main
            
            # Authenticate AWS server with GitHub Packages Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Fetch the newly built production images
            docker compose pull
            
            # Restart the service containers seamlessly in background mode
            docker compose up -d --remove-orphans
            
            # Prune obsolete dangling images to preserve server disk space
            docker image prune -f